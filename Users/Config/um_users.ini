qsm.UM.Users.um_user_code.description="U/M Users"
qsm.UM.Users.um_user_code.marker="~"
qsm.UM.Users.um_user_code.model="\Numbers\Users\Users\Model\Users"
qsm.UM.Users.um_user_code.have_batches = true
qsm.UM.Users.um_user_code.role = "context_user"

; --- commands and mentions ---
qsc.UM.Users.date.name = "Date"
qsc.UM.Users.date.loc = "NF.Form.Date"
