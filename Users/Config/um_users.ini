[*,production,staging,testing,development]
flag.global.default_postlogin_page = "/Numbers/Users/Users/Controller/Helper/Dashboard"
flag.global.default_login_page = "/Numbers/Users/Users/Controller/Login"
flag.global.default_logout_page = "/Numbers/Users/Users/Controller/Logout"
flag.global.default_mfa_page = "/Numbers/Users/Users/Controller/MFA"

; --- U/M Form ---
flag.form.um_users.unique_numeric_phone = true

; --- scopes ---
scope.UM.Register.um_role_code = "DEFAULT"
scope.UM.Register.on_organization_code = "DEFAULT"
scope.UM.Register.um_user_type_id = 10

; --- scoped attributes ---
scoped_attributes.subform.list = "\Numbers\Users\Users\Form\ABAC\List2\AssignmentRecordsList2"
scoped_attributes.subform.link = "um_abac_assignment_records_list"

; --- import presets ---
import_presets.import_form.available = "\Numbers\Users\Users\Helper\Import\Presets::seeAvailableImports"

; --- registrations ---
registration.UM.Users.name = "Register (Advanced)"
registration.UM.Users.icon = "fas fa-chess-board"
registration.UM.Users.link = "host://Numbers/Users/Users/Controller/Register/_Index"
registration.UM.Users.scope = "UM.Register"
registration.UM.Users.hold = true
registration.UM.Users.channel = "Website (Advanced)"

registration.UM.UserSimple.name = "Register (Simple)"
registration.UM.UserSimple.icon = "fas fa-chess-board"
registration.UM.UserSimple.link = "host://Numbers/Users/Users/Controller/Register/_Simple"
registration.UM.UserSimple.scope = "UM.Register"
registration.UM.UserSimple.hold = false
registration.UM.UserSimple.channel = "Website (Simple)"

; --- quick search and mentions ---
qsm.UM.Users.um_user_id.column_key="um_user_id"
qsm.UM.Users.um_user_id.column_id="um_user_id"
qsm.UM.Users.um_user_id.column_id_numeric = true
qsm.UM.Users.um_user_id.column_name="um_user_name"
qsm.UM.Users.um_user_id.column_orderby="um_user_name"
