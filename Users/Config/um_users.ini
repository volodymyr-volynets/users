qsm.UM.Users.um_user_id.marker="~"
qsm.UM.Users.um_user_id.model="\Numbers\Users\Users\Model\Users"
qsm.UM.Users.um_user_id.have_batches = true
qsm.UM.Users.um_user_id.role = "context_user"

qsm.UM.Users.um_user_code.column_key="um_user_code"
qsm.UM.Users.um_user_code.column_id="um_user_id"
